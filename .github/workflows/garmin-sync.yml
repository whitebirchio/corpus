# Nightly Garmin Connect → Corpus sync (specs/01-initial-platform/SPEC.md §8.4).
#
# Runs the unofficial-API pull in real Python (the Workers sandbox can't —
# garminconnect needs raw sockets). ~1-2 min/night against a 2,000-min/month
# free tier. Failure emails come from GitHub by default; a missed night
# self-heals because every run pulls a trailing 7-day window.
#
# Secrets: CORPUS_INGEST_SECRET (mirrors the worker's GARMIN_INGEST_SECRET).
# Garmin credentials are NOT stored here — tokens are bootstrapped locally
# (see docs/SETUP.md §7) and live in the worker's KV token store.
name: garmin-sync

on:
  schedule:
    - cron: "30 09 * * *" # 05:30/06:30 America/New_York depending on DST
  workflow_dispatch:
    inputs:
      days:
        description: "Trailing days to pull"
        required: false
        default: "7"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/garmin-sync/requirements.txt
      - run: pip install -r apps/garmin-sync/requirements.txt
      - run: python apps/garmin-sync/sync.py pull --days "${{ inputs.days || '7' }}"
        env:
          CORPUS_BASE_URL: https://corpus-mcp.whitebirch.workers.dev
          CORPUS_INGEST_SECRET: ${{ secrets.CORPUS_INGEST_SECRET }}
          CORPUS_USER_EMAIL: scott.schmalz@gmail.com
          CORPUS_TIMEZONE: America/New_York
